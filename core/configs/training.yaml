# =====================================================================
# AlphaZero training configuration
# =====================================================================

seed: 42
device: cuda            # cuda | cpu
output_dir: outputs/training

game:
  width: 10             # board width in hexes
  height: 10            # board height in hexes
  move_size: 2          # unit movement range (2 -> 19 reachable hexes)
  max_moves: 400        # hard cap on game length (draw after that)
  islands: 2            # number of islands generated
  island_size: 7        # island generation potential
  tree_probability: 0.1 # probability of a tree on an active hex
  tree_growth_probability: 0.01

network:
  channels: 128         # residual tower width
  blocks: 8             # number of residual blocks
  value_head_hidden: 256
  learning_rate: 0.001
  weight_decay: 0.0001
  lr_decay_steps: 100000
  lr_decay_rate: 0.1

mcts:
  simulations: 200      # MCTS simulations per move
  c_puct: 1.5
  dirichlet_alpha: 0.3
  dirichlet_epsilon: 0.25
  temperature_moves: 30 # sample proportionally for the first N moves, then argmax
  virtual_loss: 3.0

self_play:
  games_per_iteration: 256
  parallel_workers: 16      # self-play threads
  inference_batch_size: 64  # batch size for the shared inference server
  inference_timeout_us: 500 # microseconds to wait to fill a batch

replay_buffer:
  capacity: 500000          # positions
  min_size_to_train: 10000

training:
  iterations: 1000
  batch_size: 512
  batches_per_iteration: 200
  checkpoint_every: 5       # iterations
  checkpoint_dir: checkpoints

evaluation:
  enabled: true
  games: 40
  every_iterations: 5
  win_rate_to_promote: 0.55