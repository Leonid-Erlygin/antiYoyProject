# =====================================================================
# Game visualization configuration
# =====================================================================

seed: 7
output_dir: outputs/visualization

game:
  width: 10
  height: 5
  move_size: 2
  max_moves: 100
  islands: 2
  island_size: 7
  tree_probability: 0.1
  tree_growth_probability: 0.01

render:
  mode: assets            # assets (game sprites, PNG output) | vector (svg/ppm)
  assets_path: /app/assets
  hex_radius_px: 32       # hexagon radius in pixels
  save_every_move: 1      # render every N-th move
  format: png             # png (assets mode) | svg | ppm (vector mode)

players:
  # each: random | mcts
  first: random #random
  second: random

# used only if a player is 'mcts'
model_checkpoint: /app/core/outputs/training/checkpoints/model_iter_5.pt
mcts:
  simulations: 200
  c_puct: 1.5
  temperature_moves: 0    # deterministic play

device: cpu